---
- name: Reinstalar Zabbix Agent 2 nos Windows da Taiba
  hosts: windows_hosts
  gather_facts: false

  vars:
    zabbix_server_ip: "10.212.134.202"
    zabbix_server_allowed: "10.212.134.202,10.212.134.203,10.212.0.0/16,10.197.0.0/16"
    zabbix_agent_port: 10050
    zabbix_server_port: 10051
    zabbix_hostname: "{{ inventory_hostname }}"

    # Se true, o playbook falha caso o host nao conecte no Zabbix Server:10051.
    # Recomendado deixar false para nao quebrar a instalacao por problema de rede/firewall/VPN.
    zabbix_fail_if_no_server_connection: false

    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_temp_dir: "C:\\Temp"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"
    zabbix_install_dir: "C:\\Program Files\\Zabbix Agent 2"
    zabbix_conf: "{{ zabbix_install_dir }}\\zabbix_agent2.conf"
    zabbix_log: "{{ zabbix_install_dir }}\\zabbix_agent2.log"
    zabbix_service_name: "Zabbix Agent 2"

  tasks:
    - name: Criar pasta temporaria
      ansible.windows.win_file:
        path: "{{ zabbix_temp_dir }}"
        state: directory

    - name: Baixar instalador do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    - name: Buscar todas as instalacoes do Zabbix Agent no registro
      ansible.windows.win_shell: |
        $paths = @(
          'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall',
          'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall'
        )

        $found = foreach ($p in $paths) {
          if (Test-Path $p) {
            Get-ChildItem $p |
              Get-ItemProperty |
              Where-Object { $_.DisplayName -like 'Zabbix Agent*' }
          }
        }

        if ($found) {
          $found | ForEach-Object { Write-Output $_.PSChildName }
        } else {
          Write-Output "NOTINSTALLED"
        }
      register: zabbix_check
      changed_when: false

    - name: Desinstalar todas as instalacoes existentes do Zabbix Agent sem reiniciar
      ansible.windows.win_package:
        product_id: "{{ item }}"
        arguments: "/quiet /norestart REBOOT=ReallySuppress"
        state: absent
      loop: "{{ zabbix_check.stdout_lines }}"
      when:
        - zabbix_check.stdout_lines | length > 0
        - zabbix_check.stdout_lines | first != 'NOTINSTALLED'

    - name: Garantir que o servico antigo nao ficou orfao
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        state: stopped
      ignore_errors: true
      when:
        - zabbix_check.stdout_lines | length > 0
        - zabbix_check.stdout_lines | first != 'NOTINSTALLED'

    - name: Instalar Zabbix Agent 2
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        arguments: >-
          /quiet
          /norestart
          REBOOT=ReallySuppress
          SERVER="{{ zabbix_server_allowed }}"
          SERVERACTIVE="{{ zabbix_server_ip }}:{{ zabbix_server_port }}"
          LISTENPORT="{{ zabbix_agent_port }}"
          LISTENIP="0.0.0.0"
          HOSTNAME="{{ zabbix_hostname }}"
        state: present

    - name: Parar servico para aplicar configuracao
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        state: stopped
      ignore_errors: true

    - name: Ajustar configuracao do agente
      ansible.windows.win_shell: |
        $conf = "{{ zabbix_conf }}"

        $settings = [ordered]@{
          "Server"       = "{{ zabbix_server_allowed }}"
          "ServerActive" = "{{ zabbix_server_ip }}:{{ zabbix_server_port }}"
          "Hostname"     = "{{ zabbix_hostname }}"
          "ListenPort"   = "{{ zabbix_agent_port }}"
          "ListenIP"     = "0.0.0.0"
        }

        if (-not (Test-Path -LiteralPath $conf)) {
          throw "Arquivo de configuracao nao encontrado: $conf"
        }

        $content = Get-Content -LiteralPath $conf
        $changed = $false

        foreach ($key in $settings.Keys) {
          $line = "$key=$($settings[$key])"
          $pattern = "^\s*#?\s*$key\s*=.*$"

          if ($content -match $pattern) {
            $newContent = $content | ForEach-Object {
              if ($_ -match $pattern) {
                $line
              } else {
                $_
              }
            }
          } else {
            $newContent = $content + $line
          }

          if (($newContent -join "`n") -ne ($content -join "`n")) {
            $changed = $true
            $content = $newContent
          }
        }

        if ($changed) {
          Set-Content -LiteralPath $conf -Value $content -Encoding ASCII
          Write-Output "CHANGED"
        } else {
          Write-Output "OK"
        }
      register: zabbix_config
      changed_when: "'CHANGED' in zabbix_config.stdout"

    - name: Liberar porta do agente no firewall
      ansible.windows.win_shell: |
        Get-NetFirewallRule -DisplayName "Zabbix Agent 2" -ErrorAction SilentlyContinue |
          Remove-NetFirewallRule

        New-NetFirewallRule `
          -DisplayName "Zabbix Agent 2" `
          -Direction Inbound `
          -Action Allow `
          -Protocol TCP `
          -LocalPort {{ zabbix_agent_port }} `
          -Profile Any | Out-Null

        Write-Output "CHANGED"
      register: zabbix_firewall
      changed_when: "'CHANGED' in zabbix_firewall.stdout"

    - name: Liberar porta do agente no firewall legado se existir
      ansible.windows.win_shell: |
        netsh advfirewall firewall delete rule name="Zabbix Agent 2 Legacy" | Out-Null
        netsh advfirewall firewall add rule name="Zabbix Agent 2 Legacy" dir=in action=allow protocol=TCP localport={{ zabbix_agent_port }} | Out-Null
        Write-Output "CHANGED"
      register: zabbix_firewall_legacy
      changed_when: "'CHANGED' in zabbix_firewall_legacy.stdout"

    - name: Garantir que o perfil de rede permite a regra
      ansible.windows.win_shell: |
        try {
          Set-NetConnectionProfile -NetworkCategory Private -ErrorAction SilentlyContinue
        } catch {
          Write-Output "Perfil de rede nao alterado: $($_.Exception.Message)"
        }
      changed_when: false
      failed_when: false

    - name: Garantir servico iniciado
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        start_mode: auto
        state: started

    - name: Validar servico local do Zabbix Agent 2
      ansible.windows.win_shell: |
        $svc = Get-Service -Name "{{ zabbix_service_name }}" -ErrorAction Stop

        if ($svc.Status -ne "Running") {
          throw "Servico nao esta rodando: $($svc.Status)"
        }

        $listener = Get-NetTCPConnection -LocalPort {{ zabbix_agent_port }} -State Listen -ErrorAction SilentlyContinue

        if (-not $listener) {
          throw "Agent nao esta escutando localmente na porta {{ zabbix_agent_port }}"
        }

        Write-Output "OK - Servico {{ zabbix_service_name }} esta rodando"
        Write-Output "OK - Agent escutando localmente na porta {{ zabbix_agent_port }}"
      register: zabbix_local_status
      changed_when: false

    - name: Validar conexao com Zabbix Server
      ansible.windows.win_shell: |
        $serverIp = "{{ zabbix_server_ip }}"
        $serverPort = {{ zabbix_server_port }}
        $failIfNoConnection = "{{ zabbix_fail_if_no_server_connection | bool }}"

        $server = Test-NetConnection -ComputerName $serverIp -Port $serverPort -WarningAction SilentlyContinue

        if ($server.TcpTestSucceeded) {
          Write-Output "OK - Conexao com Zabbix Server $serverIp`:$serverPort funcionando"
          exit 0
        }

        Write-Output "AVISO - Sem conexao com Zabbix Server $serverIp`:$serverPort"
        Write-Output "AVISO - Verificar firewall, rota, VPN ou se o Zabbix Server esta escutando na porta $serverPort"

        if ($failIfNoConnection -eq "True") {
          throw "Sem conexao com Zabbix Server $serverIp`:$serverPort"
        }

        exit 0
      register: zabbix_server_connection
      changed_when: false

    - name: Exibir configuracao aplicada
      ansible.builtin.debug:
        msg:
          - "Hostname={{ zabbix_hostname }}"
          - "Server={{ zabbix_server_allowed }}"
          - "ServerActive={{ zabbix_server_ip }}:{{ zabbix_server_port }}"
          - "ListenIP=0.0.0.0"
          - "ListenPort={{ zabbix_agent_port }}"

    - name: Exibir validacao local
      ansible.builtin.debug:
        var: zabbix_local_status.stdout_lines

    - name: Exibir validacao de conexao com Zabbix Server
      ansible.builtin.debug:
        var: zabbix_server_connection.stdout_lines

    - name: Exibir ultimas linhas do log do agente
      ansible.windows.win_shell: |
        if (Test-Path -LiteralPath "{{ zabbix_log }}") {
          Get-Content -LiteralPath "{{ zabbix_log }}" -Tail 30
        } else {
          Write-Output "Log ainda nao encontrado: {{ zabbix_log }}"
        }
      register: zabbix_log_tail
      changed_when: false
      failed_when: false

    - name: Exibir log do agente
      ansible.builtin.debug:
        var: zabbix_log_tail.stdout_lines
