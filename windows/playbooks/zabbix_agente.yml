---
- name: Reinstalar Zabbix Agent 2 nos Windows da Taiba
  hosts: windows_hosts
  gather_facts: false

  vars:
    zabbix_server_ip: "10.212.134.202"
    zabbix_server_allowed: "10.212.134.202,10.212.134.203,10.212.0.0/16,10.197.0.0/16"
    zabbix_agent_port: 10050
    zabbix_server_port: 10051
    zabbix_hostname: "{{ inventory_hostname }}"

    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_temp_dir: "C:\\Temp"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"
    zabbix_install_dir: "C:\\Program Files\\Zabbix Agent 2"
    zabbix_conf: "{{ zabbix_install_dir }}\\zabbix_agent2.conf"
    zabbix_log: "{{ zabbix_install_dir }}\\zabbix_agent2.log"
    zabbix_service_name: "Zabbix Agent 2"

  tasks:
    - name: Criar pasta temporaria
      ansible.windows.win_file:
        path: "{{ zabbix_temp_dir }}"
        state: directory

    - name: Baixar instalador do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    - name: Buscar todas as instalacoes do Zabbix Agent (registro 64 e 32 bits)
      ansible.windows.win_shell: |
        $paths = @(
          'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall',
          'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall'
        )
        $found = foreach ($p in $paths) {
          if (Test-Path $p) {
            Get-ChildItem $p | Get-ItemProperty | Where-Object { $_.DisplayName -like 'Zabbix Agent*' }
          }
        }
        if ($found) {
          $found | ForEach-Object { Write-Output $_.PSChildName }
        } else {
          Write-Output "NOTINSTALLED"
        }
      register: zabbix_check
      changed_when: false

    - name: Desinstalar todas as instalacoes existentes do Zabbix Agent (sem reiniciar)
      ansible.windows.win_package:
        product_id: "{{ item }}"
        arguments: "/quiet /norestart REBOOT=ReallySuppress"
        state: absent
      loop: "{{ zabbix_check.stdout_lines }}"
      when: zabbix_check.stdout_lines | first != 'NOTINSTALLED'

    - name: Garantir que o servico antigo nao ficou orfao
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        state: stopped
      ignore_errors: true
      when: zabbix_check.stdout_lines | first != 'NOTINSTALLED'

    - name: Instalar Zabbix Agent 2
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        arguments: >-
          /quiet
          /norestart
          REBOOT=ReallySuppress
          SERVER="{{ zabbix_server_allowed }}"
          SERVERACTIVE="{{ zabbix_server_ip }}:{{ zabbix_server_port }}"
          LISTENPORT="{{ zabbix_agent_port }}"
          HOSTNAME="{{ zabbix_hostname }}"
        state: present

    - name: Parar servico para aplicar configuracao
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        state: stopped
      ignore_errors: true

    - name: Ajustar configuracao do agente
      ansible.windows.win_shell: |
        $conf = "{{ zabbix_conf }}"
        $settings = @{
          "Server" = "{{ zabbix_server_allowed }}"
          "ServerActive" = "{{ zabbix_server_ip }}:{{ zabbix_server_port }}"
          "Hostname" = "{{ zabbix_hostname }}"
          "ListenPort" = "{{ zabbix_agent_port }}"
        }

        if (-not (Test-Path -LiteralPath $conf)) {
          throw "Arquivo de configuracao nao encontrado: $conf"
        }

        $content = Get-Content -LiteralPath $conf
        $changed = $false

        foreach ($key in $settings.Keys) {
          $line = "$key=$($settings[$key])"
          $pattern = "^\s*#?\s*$key\s*=.*$"

          if ($content -match $pattern) {
            $newContent = $content | ForEach-Object {
              if ($_ -match $pattern) { $line } else { $_ }
            }
          } else {
            $newContent = $content + $line
          }

          if (($newContent -join "`n") -ne ($content -join "`n")) {
            $changed = $true
            $content = $newContent
          }
        }

        if ($changed) {
          Set-Content -LiteralPath $conf -Value $content -Encoding ASCII
          Write-Output "CHANGED"
        } else {
          Write-Output "OK"
        }
      register: zabbix_config
      changed_when: "'CHANGED' in zabbix_config.stdout"

    - name: Liberar porta do agente no firewall
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallRule -DisplayName "Zabbix Agent 2" -ErrorAction SilentlyContinue

        if (-not $rule) {
          New-NetFirewallRule -DisplayName "Zabbix Agent 2" -Direction Inbound -Action Allow -Protocol TCP -LocalPort {{ zabbix_agent_port }} | Out-Null
          Write-Output "CHANGED"
        } else {
          Set-NetFirewallRule -DisplayName "Zabbix Agent 2" -Enabled True -Direction Inbound -Action Allow
          Write-Output "OK"
        }
      register: zabbix_firewall
      changed_when: "'CHANGED' in zabbix_firewall.stdout"

    - name: Garantir servico iniciado
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        start_mode: auto
        state: started

    - name: Validar servico e conexao com o Zabbix Server
      ansible.windows.win_shell: |
        $svc = Get-Service -Name "{{ zabbix_service_name }}" -ErrorAction Stop
        if ($svc.Status -ne "Running") {
          throw "Servico nao esta rodando: $($svc.Status)"
        }

        $server = Test-NetConnection -ComputerName "{{ zabbix_server_ip }}" -Port {{ zabbix_server_port }} -WarningAction SilentlyContinue
        if (-not $server.TcpTestSucceeded) {
          throw "Sem conexao com {{ zabbix_server_ip }}:{{ zabbix_server_port }}"
        }

        Write-Output "OK - {{ zabbix_hostname }} conectado ao Zabbix Server {{ zabbix_server_ip }}:{{ zabbix_server_port }}"
        Write-Output "Server={{ zabbix_server_allowed }}"
        Write-Output "ServerActive={{ zabbix_server_ip }}:{{ zabbix_server_port }}"

        if (Test-Path -LiteralPath "{{ zabbix_log }}") {
          Get-Content -LiteralPath "{{ zabbix_log }}" -Tail 30
        }
      register: zabbix_status
      changed_when: false

    - name: Exibir status
      ansible.builtin.debug:
        var: zabbix_status.stdout
