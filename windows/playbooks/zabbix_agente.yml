---
- name: Instalar e configurar Zabbix Agent 2 nos Windows da Taiba
  hosts: windows_hosts
  gather_facts: false

  vars:
    # IP do Zabbix Server visto pelos hosts Windows pela VPN.
    # Nao use 172.31.240.254 aqui, pois esse IP existe apenas dentro do Docker.
    zabbix_server_ip: "10.212.134.202"
    zabbix_server_port: 10051
    zabbix_server_passive: "{{ zabbix_server_ip }}"
    zabbix_server_active: "{{ zabbix_server_ip }}:{{ zabbix_server_port }}"
    zabbix_agent_port: 10050
    zabbix_hostname: "{{ inventory_hostname }}"

    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_temp_dir: "C:\\Temp"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"
    zabbix_install_dir: "C:\\Program Files\\Zabbix Agent 2"
    zabbix_agent2_exe: "{{ zabbix_install_dir }}\\zabbix_agent2.exe"
    zabbix_conf: "{{ zabbix_install_dir }}\\zabbix_agent2.conf"
    zabbix_log: "{{ zabbix_install_dir }}\\zabbix_agent2.log"
    zabbix_msi_log: "{{ zabbix_temp_dir }}\\zabbix_agent2_install.log"
    zabbix_service_name: "Zabbix Agent 2"
    zabbix_firewall_rule_name: "Zabbix Agent 2"

  tasks:
    - name: Criar diretorio temporario
      ansible.windows.win_file:
        path: "{{ zabbix_temp_dir }}"
        state: directory

    - name: Verificar se Zabbix Agent 2 ja esta instalado
      ansible.windows.win_stat:
        path: "{{ zabbix_agent2_exe }}"
      register: zabbix_agent2_file

    - name: Baixar MSI do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false
      when: not zabbix_agent2_file.stat.exists

    - name: Instalar Zabbix Agent 2 sem reiniciar o Windows
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        arguments: >-
          /quiet
          /norestart
          /l*v "{{ zabbix_msi_log }}"
          SERVER="{{ zabbix_server_passive }}"
          SERVERACTIVE="{{ zabbix_server_active }}"
          LISTENPORT="{{ zabbix_agent_port }}"
          HOSTNAME="{{ zabbix_hostname }}"
          ENABLEPATH="1"
        state: present
        creates_path: "{{ zabbix_agent2_exe }}"
      when: not zabbix_agent2_file.stat.exists

    - name: Aguardar servico Zabbix Agent 2 ficar disponivel
      ansible.windows.win_service_info:
        name: "{{ zabbix_service_name }}"
      register: zabbix_service_info
      until: zabbix_service_info.exists
      retries: 30
      delay: 2

    - name: Garantir configuracao correta do agente
      ansible.windows.win_shell: |
        $conf = "{{ zabbix_conf }}"
        $settings = [ordered]@{
          "Server" = "{{ zabbix_server_passive }}"
          "ServerActive" = "{{ zabbix_server_active }}"
          "Hostname" = "{{ zabbix_hostname }}"
          "ListenPort" = "{{ zabbix_agent_port }}"
          "TLSConnect" = "unencrypted"
          "TLSAccept" = "unencrypted"
        }

        if (-not (Test-Path -LiteralPath $conf)) {
          throw "Arquivo de configuracao nao encontrado: $conf"
        }

        $content = @(Get-Content -LiteralPath $conf)
        $changed = $false

        foreach ($key in $settings.Keys) {
          $value = $settings[$key]
          $line = "$key=$value"
          $pattern = "^\s*#?\s*$([regex]::Escape($key))\s*=.*$"

          if ($content -match $pattern) {
            $newContent = foreach ($item in $content) {
              if ($item -match $pattern) { $line } else { $item }
            }

            if (($newContent -join "`n") -ne ($content -join "`n")) {
              $changed = $true
            }

            $content = @($newContent)
          } else {
            $content += $line
            $changed = $true
          }
        }

        if ($changed) {
          Set-Content -LiteralPath $conf -Value $content -Encoding ASCII
          Write-Output "CHANGED"
        } else {
          Write-Output "OK"
        }
      register: zabbix_config
      changed_when: "'CHANGED' in zabbix_config.stdout"
      notify: Reiniciar Zabbix Agent 2

    - name: Liberar porta 10050 no firewall do Windows
      ansible.windows.win_shell: |
        $ruleName = "{{ zabbix_firewall_rule_name }}"
        $port = "{{ zabbix_agent_port }}"
        $existing = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue

        if ($existing) {
          $portFilter = Get-NetFirewallPortFilter -AssociatedNetFirewallRule $existing
          if ($existing.Enabled -ne "True" -or $existing.Direction -ne "Inbound" -or $existing.Action -ne "Allow" -or $portFilter.Protocol -ne "TCP" -or $portFilter.LocalPort -ne $port) {
            Set-NetFirewallRule -DisplayName $ruleName -Enabled True -Direction Inbound -Action Allow
            Set-NetFirewallPortFilter -AssociatedNetFirewallRule $existing -Protocol TCP -LocalPort $port
            Write-Output "CHANGED"
          } else {
            Write-Output "OK"
          }
        } else {
          New-NetFirewallRule -DisplayName $ruleName -Direction Inbound -Action Allow -Protocol TCP -LocalPort $port | Out-Null
          Write-Output "CHANGED"
        }
      register: zabbix_firewall
      changed_when: "'CHANGED' in zabbix_firewall.stdout"

    - name: Configurar servico para iniciar automaticamente
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        start_mode: auto
        state: started

    - name: Aplicar reinicio do servico antes da validacao
      ansible.builtin.meta: flush_handlers

    - name: Validar servico, porta, configuracao e acesso ao server
      ansible.windows.win_shell: |
        $svc = Get-Service -Name "{{ zabbix_service_name }}" -ErrorAction Stop
        if ($svc.Status -ne "Running") {
          throw "Servico com status inesperado: $($svc.Status)"
        }

        $listener = Get-NetTCPConnection -LocalPort {{ zabbix_agent_port }} -State Listen -ErrorAction SilentlyContinue
        if (-not $listener) {
          throw "Porta {{ zabbix_agent_port }} nao esta em LISTEN"
        }

        $serverTest = Test-NetConnection -ComputerName "{{ zabbix_server_ip }}" -Port {{ zabbix_server_port }} -WarningAction SilentlyContinue
        if (-not $serverTest.TcpTestSucceeded) {
          throw "Nao conectou no Zabbix Server {{ zabbix_server_ip }}:{{ zabbix_server_port }}"
        }

        $conf = Get-Content -LiteralPath "{{ zabbix_conf }}"
        $expected = @(
          "Server={{ zabbix_server_passive }}",
          "ServerActive={{ zabbix_server_active }}",
          "Hostname={{ zabbix_hostname }}",
          "ListenPort={{ zabbix_agent_port }}",
          "TLSConnect=unencrypted",
          "TLSAccept=unencrypted"
        )

        foreach ($line in $expected) {
          if ($conf -notcontains $line) {
            throw "Configuracao ausente: $line"
          }
        }

        Write-Output "OK - {{ zabbix_hostname }} com Agent 2 em {{ zabbix_agent_port }}"
        Write-Output "Server={{ zabbix_server_passive }}"
        Write-Output "ServerActive={{ zabbix_server_active }}"
      register: zabbix_validation

    - name: Resultado final
      ansible.builtin.debug:
        msg: "{{ zabbix_validation.stdout_lines }}"

    - name: Mostrar ultimas linhas do log do Zabbix Agent 2
      ansible.windows.win_shell: |
        if (Test-Path -LiteralPath "{{ zabbix_log }}") {
          Get-Content -LiteralPath "{{ zabbix_log }}" -Tail 80
        } else {
          Write-Output "Log nao encontrado: {{ zabbix_log }}"
        }
      register: zabbix_agent_log
      changed_when: false

    - name: Log do Zabbix Agent 2
      ansible.builtin.debug:
        msg: "{{ zabbix_agent_log.stdout_lines }}"

  handlers:
    - name: Reiniciar Zabbix Agent 2
      ansible.windows.win_service:
        name: "{{ zabbix_service_name }}"
        state: restarted
