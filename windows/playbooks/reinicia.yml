---
- name: Reiniciar maquinas Windows
  hosts: windows_hosts
  gather_facts: false
  vars:
    reboot_msg: "Reinicializacao agendada via Ansible/Semaphore"
    reboot_timeout: 600
    pre_reboot_delay: 15

  tasks:

    # =========================================================================
    # 1. VERIFICAR ESTADO ANTES DO REBOOT
    # =========================================================================

    - name: Checar uptime atual da maquina
      ansible.windows.win_shell: |
        $os = Get-CimInstance Win32_OperatingSystem
        $uptime = (Get-Date) - $os.LastBootUpTime
        Write-Output "UPTIME=$($uptime.Days)d $($uptime.Hours)h $($uptime.Minutes)m"
      register: uptime_before

    - name: Mostrar uptime antes do reboot
      ansible.builtin.debug:
        msg: "{{ uptime_before.stdout_lines }}"

    # =========================================================================
    # 2. REINICIAR E AGUARDAR VOLTAR ONLINE
    # =========================================================================

    - name: Reiniciar a maquina e aguardar reconexao
      ansible.windows.win_reboot:
        msg: "{{ reboot_msg }}"
        pre_reboot_delay: "{{ pre_reboot_delay }}"
        reboot_timeout: "{{ reboot_timeout }}"
        test_command: "whoami"

    # =========================================================================
    # 3. VALIDAÇÃO FINAL
    # =========================================================================

    - name: Confirmar que a maquina voltou e checar novo uptime
      ansible.windows.win_shell: |
        $os = Get-CimInstance Win32_OperatingSystem
        $uptime = (Get-Date) - $os.LastBootUpTime
        Write-Output "OK - maquina online apos reboot"
        Write-Output "UPTIME=$($uptime.Days)d $($uptime.Hours)h $($uptime.Minutes)m"
      register: final_check

    - name: Resultado final
      ansible.builtin.debug:
        msg: "{{ final_check.stdout_lines }}"
