---
- name: Identificar impressoras na rede (IP, MAC e fabricante)
  hosts: localhost
  connection: local
  gather_facts: false
  become: true   # necessário para arp-scan usar raw socket

  vars:
    rede: "10.197.3.0/24"

    fabricantes_impressora:
      - "Hewlett Packard"
      - "HP"
      - "Brother"
      - "Canon"
      - "Seiko Epson"
      - "Epson"
      - "Kyocera"
      - "Xerox"
      - "Ricoh"
      - "Lexmark"
      - "Samsung"
      - "Konica"
      - "Oki Data"

    arquivo_csv: "./impressoras_{{ rede | regex_replace('[/.]', '_') }}.csv"


  tasks:

    - name: Verificar se arp-scan está instalado
      ansible.builtin.command:
        cmd: which arp-scan
      register: arp_scan_check
      changed_when: false
      failed_when: false


    - name: Instalar arp-scan (Debian/Ubuntu)
      ansible.builtin.apt:
        name: arp-scan
        state: present
        update_cache: true
      when: arp_scan_check.rc != 0


    - name: Executar arp-scan na rede
      ansible.builtin.command:
        cmd: >
          arp-scan
          --retry=2
          --timeout=500
          {{ rede }}
      register: scan
      changed_when: false


    - name: Filtrar somente fabricantes de impressora
      ansible.builtin.set_fact:
        impressoras: >-
          {{
            scan.stdout_lines
            | select('search', fabricantes_impressora | join('|'))
            | list
          }}


    - name: Mostrar impressoras encontradas
      ansible.builtin.debug:
        var: impressoras


    - name: Criar CSV
      ansible.builtin.copy:
        dest: "{{ arquivo_csv }}"
        content: |
          IP,MAC,Fabricante
          {% for linha in impressoras %}
          {{ linha.split('\t')[0] }},{{ linha.split('\t')[1] }},{{ linha.split('\t')[2] }}
          {% endfor %}


    - name: Resumo final
      ansible.builtin.debug:
        msg:
          - "Rede analisada: {{ rede }}"
          - "Quantidade encontrada: {{ impressoras | length }}"
          - "Arquivo gerado: {{ arquivo_csv }}"
