---
- name: Escolher um host Windows remoto acessivel
  hosts: "{{ scan_target_group | default('windows_hosts') }}"
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Testar conexao WinRM
      ansible.windows.win_ping:
      register: teste_winrm
      changed_when: false
      failed_when: false

    - name: Adicionar host acessivel ao grupo de scanners
      ansible.builtin.add_host:
        name: "{{ inventory_hostname }}"
        groups: scanners_impressoras
      when:
        - teste_winrm is defined
        - not (teste_winrm.unreachable | default(false))
        - teste_winrm.ping | default('') == 'pong'

- name: Validar scanner remoto
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Falhar se nenhum host Windows acessivel foi encontrado
      ansible.builtin.fail:
        msg: |
          Nenhum host do grupo "{{ scan_target_group | default('windows_hosts') }}" respondeu ao WinRM.

          Verifique no inventario:
          - ansible_host
          - ansible_port: 5985
          - ansible_connection: winrm
          - usuario e senha
          - firewall/WinRM ativo no Windows remoto
      when: groups['scanners_impressoras'] | default([]) | length == 0

    - name: Mostrar host escolhido para executar o scan
      ansible.builtin.debug:
        msg: "Scanner escolhido: {{ groups['scanners_impressoras'][0] }}"

- name: Identificar impressoras a partir de um host Windows remoto
  hosts: scanners_impressoras
  gather_facts: false

  vars:
    # Ajuste no Semaphore se a rede do local for outra.
    scan_rede_prefixo: "10.197.3"
    scan_inicio: 1
    scan_fim: 254

    # Portas de impressao. HTTP/HTTPS ficam fora por padrao para reduzir
    # conexoes desnecessarias e falso positivo em outros equipamentos.
    scan_portas_impressora:
      - 9100
      - 515
      - 631

    scan_timeout_ms: 200
    scan_pausa_ms: 50
    scan_exigir_ping: true

  tasks:

    - name: Executar scan de impressoras no local remoto
      ansible.windows.win_shell: |
        $Prefixo = "{{ scan_rede_prefixo }}"
        $Inicio = {{ scan_inicio | int }}
        $Fim = {{ scan_fim | int }}
        $Portas = @({{ scan_portas_impressora | join(',') }})
        $TimeoutMs = {{ scan_timeout_ms | int }}
        $PausaMs = {{ scan_pausa_ms | int }}
        $ExigirPing = [System.Convert]::ToBoolean("{{ scan_exigir_ping | bool }}")

        function Test-PortaTcp {
          param(
            [string]$Ip,
            [int]$Porta,
            [int]$Timeout
          )

          $Client = New-Object System.Net.Sockets.TcpClient
          try {
            $Async = $Client.BeginConnect($Ip, $Porta, $null, $null)
            if (-not $Async.AsyncWaitHandle.WaitOne($Timeout, $false)) {
              return $false
            }
            $Client.EndConnect($Async)
            return $true
          } catch {
            return $false
          } finally {
            $Client.Close()
          }
        }

        function Test-Ping {
          param(
            [string]$Ip,
            [int]$Timeout
          )

          try {
            $Ping = New-Object System.Net.NetworkInformation.Ping
            $Reply = $Ping.Send($Ip, $Timeout)
            return $Reply.Status -eq [System.Net.NetworkInformation.IPStatus]::Success
          } catch {
            return $false
          }
        }

        $Resultados = New-Object System.Collections.Generic.List[object]

        foreach ($Numero in $Inicio..$Fim) {
          $Ip = "$Prefixo.$Numero"
          $PingOk = Test-Ping -Ip $Ip -Timeout $TimeoutMs
          $PortasAbertas = New-Object System.Collections.Generic.List[int]

          if ($PingOk -or -not $ExigirPing) {
            foreach ($Porta in $Portas) {
              if (Test-PortaTcp -Ip $Ip -Porta $Porta -Timeout $TimeoutMs) {
                [void]$PortasAbertas.Add($Porta)
              }
            }
          }

          if ($PortasAbertas.Count -gt 0) {
            $Nome = ""
            try {
              $Nome = ([System.Net.Dns]::GetHostEntry($Ip)).HostName
            } catch {
              $Nome = ""
            }

            [void]$Resultados.Add([pscustomobject]@{
              ip = $Ip
              nome = $Nome
              ping = $PingOk
              portas = @($PortasAbertas)
            })
          }

          if ($PausaMs -gt 0) {
            Start-Sleep -Milliseconds $PausaMs
          }
        }

        [pscustomobject]@{
          scanner = $env:COMPUTERNAME
          rede = "$Prefixo.$Inicio-$Fim"
          quantidade = $Resultados.Count
          impressoras = @($Resultados)
        } | ConvertTo-Json -Depth 5
      register: scan_impressoras
      changed_when: false
      run_once: true

    - name: Ler resultado do scan
      ansible.builtin.set_fact:
        resultado_scan_impressoras: "{{ scan_impressoras.stdout | from_json }}"
      run_once: true

    - name: Mostrar impressoras encontradas
      ansible.builtin.debug:
        msg: |
          ===============================
          IMPRESSORAS ENCONTRADAS
          ===============================
          Scanner usado: {{ resultado_scan_impressoras.scanner }}
          Rede analisada: {{ resultado_scan_impressoras.rede }}
          Quantidade: {{ resultado_scan_impressoras.quantidade }}

          {% for item in resultado_scan_impressoras.impressoras %}
          IP: {{ item.ip }}
          Nome: {{ item.nome | default('') }}
          Ping: {{ item.ping }}
          Portas abertas: {{ item.portas | join(', ') }}

          {% endfor %}
      run_once: true
