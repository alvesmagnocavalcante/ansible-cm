---
- name: Identificar impressoras na rede (IP, MAC e fabricante)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    rede: "10.197.3.0/24"

    fabricantes_impressora:
      - "Hewlett Packard"
      - "HP"
      - "Brother"
      - "Canon"
      - "Seiko Epson"
      - "Epson"
      - "Kyocera"
      - "Xerox"
      - "Ricoh"
      - "Lexmark"
      - "Samsung"
      - "Konica"
      - "Oki Data"


  tasks:

    - name: Verificar se arp-scan existe
      ansible.builtin.command:
        cmd: which arp-scan
      register: arp_scan_check
      changed_when: false
      failed_when: false


    - name: Instalar arp-scan (Debian/Ubuntu)
      ansible.builtin.apt:
        name: arp-scan
        state: present
        update_cache: true
      when: arp_scan_check.rc != 0


    - name: Executar varredura ARP
      ansible.builtin.command:
        cmd: >
          arp-scan
          --retry=2
          --timeout=500
          {{ rede }}
      register: scan
      changed_when: false


    - name: Filtrar somente impressoras
      ansible.builtin.set_fact:
        impressoras: >-
          {{
            scan.stdout_lines
            | select('search', fabricantes_impressora | join('|'))
            | list
          }}


    - name: Exibir impressoras encontradas
      ansible.builtin.debug:
        msg: |
          Impressoras encontradas:

          {% for linha in impressoras %}
          {{ linha }}
          {% endfor %}


    - name: Resumo
      ansible.builtin.debug:
        msg:
          - "Rede analisada: {{ rede }}"
          - "Total de impressoras encontradas: {{ impressoras | length }}"
