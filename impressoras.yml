---
- name: Identificar impressoras na rede Windows
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    rede: "10.197.3"

    fabricantes_impressora:
      - "HP"
      - "Hewlett"
      - "Brother"
      - "Canon"
      - "Epson"
      - "Kyocera"
      - "Xerox"
      - "Ricoh"
      - "Lexmark"
      - "Samsung"
      - "Konica"
      - "Oki"


  tasks:

    - name: Executar ping para popular tabela ARP
      ansible.windows.win_shell: |
        1..254 | ForEach-Object {
          ping -n 1 -w 50 {{ rede }}.$_
        }
      register: ping_scan
      changed_when: false


    - name: Consultar tabela ARP
      ansible.windows.win_shell: |
        arp -a
      register: arp_result
      changed_when: false


    - name: Mostrar dispositivos encontrados
      ansible.builtin.debug:
        var: arp_result.stdout_lines


    - name: Filtrar possíveis impressoras
      ansible.builtin.debug:
        msg: |
          Verifique fabricantes na lista:
          {% for linha in arp_result.stdout_lines %}
          {{ linha }}
          {% endfor %}
