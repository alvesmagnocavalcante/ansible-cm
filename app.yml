---
- name: Instalar Zabbix Agent 2 no Windows
  hosts: windows_hosts
  gather_facts: false

  vars:
    zabbix_server: "10.197.0.130"
    zabbix_hostname: "{{ inventory_hostname }}"
    # URL do Zabbix Agent 2
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"

  tasks:

    - name: Criar diretório temporário
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Baixar MSI do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    - name: Parar serviços antigos se existirem
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop:
        - "Zabbix Agent"
        - "Zabbix Agent 2"
      failed_when: false

    - name: Forçar desinstalação de qualquer Zabbix Agent via MSI (Limpeza)
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        state: absent
      failed_when: false

    - name: Garantir remoção completa de resquícios de serviços e arquivos
      ansible.windows.win_shell: |
        # Remove serviços travados no registro do Windows
        sc.exe delete "Zabbix Agent" 2>$null
        sc.exe delete "Zabbix Agent 2" 2>$null
        
        # Aguarda o Windows liberar os arquivos
        Start-Sleep -Seconds 5
        
        # Força a remoção das pastas antigas para não dar conflito de permissão
        if (Test-Path "C:\Program Files\Zabbix Agent") { Remove-Item -Path "C:\Program Files\Zabbix Agent" -Recurse -Force -ErrorAction SilentlyContinue }
        if (Test-Path "C:\Program Files\Zabbix Agent 2") { Remove-Item -Path "C:\Program Files\Zabbix Agent 2" -Recurse -Force -ErrorAction SilentlyContinue }
      failed_when: false

    - name: Instalar Zabbix Agent 2 (Instalação Limpa)
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        state: present
        # Parâmetros oficiais corrigidos para a arquitetura do Agent 2
        arguments: /quiet /norestart SERVER="{{ zabbix_server }}" SERVERACTIVE="{{ zabbix_server }}" HOSTNAME="{{ zabbix_hostname }}" ADD_TO_PATH=1

    - name: Abrir porta 10050 no firewall
      community.windows.win_firewall_rule:
        name: "Zabbix Agent 2"
        localport: 10050
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Garantir serviço do Zabbix Agent 2 rodando
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
        start_mode: auto
        state: started
