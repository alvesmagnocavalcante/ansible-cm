---
- name: Instalar Zabbix Agent 2 no Windows
  hosts: windows_hosts
  gather_facts: false
  vars:
    zabbix_server: "10.197.0.130"
    zabbix_hostname: "{{ inventory_hostname }}"
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"
    zabbix_install_dir: "C:\\Program Files\\Zabbix Agent 2"
    zabbix_agent2_exe: "C:\\Program Files\\Zabbix Agent 2\\zabbix_agent2.exe"
    zabbix_conf: "C:\\Program Files\\Zabbix Agent 2\\zabbix_agent2.conf"
    zabbix_log_dir: "C:\\Program Files\\Zabbix Agent 2\\logs"
    zabbix_msi_log: "C:\\Temp\\zabbix_install.log"

  tasks:

    # =========================================================================
    # 1. PREPARAÇÃO
    # =========================================================================

    - name: Criar diretório temporário
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Baixar MSI do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    # =========================================================================
    # 2. LIMPEZA COMPLETA
    # =========================================================================

    - name: Parar serviços antigos se existirem
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop:
        - "Zabbix Agent"
        - "Zabbix Agent 2"
      failed_when: false

    - name: Desinstalar Zabbix via ProductCode do MSI
      ansible.windows.win_shell: |
        $msi = "{{ zabbix_msi_dest }}"
        try {
          $installer = New-Object -ComObject WindowsInstaller.Installer
          $db = $installer.OpenDatabase($msi, 0)
          $view = $db.OpenView("SELECT Value FROM Property WHERE Property = 'ProductCode'")
          $view.Execute()
          $record = $view.Fetch()
          $productCode = $record.StringData(1)
          Write-Output "ProductCode encontrado: $productCode"
          $result = Start-Process -FilePath "msiexec.exe" `
            -ArgumentList "/x `"$productCode`" /quiet /norestart" `
            -Wait -PassThru
          Write-Output "Exit code desinstalacao: $($result.ExitCode)"
        } catch {
          Write-Output "Produto nao encontrado ou nao instalado: $_"
        }
      failed_when: false

    - name: Remover serviços órfãos e arquivos residuais
      ansible.windows.win_shell: |
        sc.exe delete "Zabbix Agent"  2>$null
        sc.exe delete "Zabbix Agent 2" 2>$null
        Start-Sleep -Seconds 5
        foreach ($path in @("C:\Program Files\Zabbix Agent", "C:\Program Files\Zabbix Agent 2")) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force -ErrorAction SilentlyContinue
            Write-Output "Removido: $path"
          }
        }
      failed_when: false

    # =========================================================================
    # 3. INSTALAÇÃO COM LOG COMPLETO
    # =========================================================================

    - name: Instalar Zabbix Agent 2 via msiexec (com log detalhado)
      ansible.windows.win_shell: |
        $logFile = "{{ zabbix_msi_log }}"
        $result = Start-Process -FilePath "msiexec.exe" -ArgumentList @(
          '/i', '{{ zabbix_msi_dest }}',
          '/quiet',
          '/norestart',
          "/l*v", $logFile,
          'SERVER={{ zabbix_server }}',
          'SERVERACTIVE={{ zabbix_server }}',
          'HOSTNAME={{ zabbix_hostname }}',
          'ENABLEPATH=1'
        ) -Wait -PassThru

        Write-Output "EXIT_CODE=$($result.ExitCode)"

        if (Test-Path $logFile) {
          Write-Output "=== ULTIMAS LINHAS DO LOG MSI ==="
          Get-Content $logFile -Tail 40 | ForEach-Object { Write-Output $_ }
        }

        exit $result.ExitCode
      register: msi_result
      failed_when: msi_result.rc is defined and msi_result.rc != 0

    # =========================================================================
    # 4. DETECTAR SE SERVIÇO FOI CRIADO — resultado em set_fact (sem condicional frágil)
    # =========================================================================

    - name: Checar existência do serviço e do executável após instalação MSI
      ansible.windows.win_shell: |
        $svcExists = $null -ne (Get-Service -Name "Zabbix Agent 2" -ErrorAction SilentlyContinue)
        $exeExists = Test-Path "{{ zabbix_agent2_exe }}"
        Write-Output "SVC_EXISTS=$svcExists"
        Write-Output "EXE_EXISTS=$exeExists"
      register: install_probe

    - name: Definir flags de instalação como facts
      ansible.builtin.set_fact:
        zabbix_svc_exists: "{{ 'SVC_EXISTS=True' in (install_probe.stdout | default('')) }}"
        zabbix_exe_exists: "{{ 'EXE_EXISTS=True' in (install_probe.stdout | default('')) }}"

    # =========================================================================
    # 6. AGUARDAR SCM E INICIAR SERVIÇO
    # =========================================================================

    - name: Aguardar serviço 'Zabbix Agent 2' ficar visível no SCM
      ansible.windows.win_shell: |
        $timeout = 30
        $elapsed = 0
        while ($elapsed -lt $timeout) {
          $svc = Get-Service -Name "Zabbix Agent 2" -ErrorAction SilentlyContinue
          if ($svc) {
            Write-Output "Servico encontrado: $($svc.Status)"
            exit 0
          }
          Start-Sleep -Seconds 2
          $elapsed += 2
        }
        Write-Error "Timeout: servico nao registrado apos ${timeout}s"
        exit 1

    - name: Configurar serviço para iniciar automaticamente e iniciar
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
        start_mode: auto
        state: started

    # =========================================================================
    # 7. FIREWALL
    # =========================================================================

    - name: Abrir porta 10050 no firewall do Windows
      community.windows.win_firewall_rule:
        name: "Zabbix Agent 2"
        localport: 10050
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    # =========================================================================
    # 8. VALIDAÇÃO FINAL
    # =========================================================================

    - name: Validar status final
      ansible.windows.win_shell: |
        $svc = Get-Service -Name "Zabbix Agent 2" -ErrorAction Stop
        if ($svc.Status -ne "Running") {
          Write-Error "Servico com status inesperado: $($svc.Status)"
          exit 1
        }
        Write-Output "OK - Zabbix Agent 2 rodando (StartType: $($svc.StartType))"
      register: final_check

    - name: Resultado final
      ansible.builtin.debug:
        msg: "{{ final_check.stdout_lines }}"
