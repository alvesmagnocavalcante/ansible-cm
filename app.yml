---
- name: Instalar Zabbix Agent 2 no Windows
  hosts: windows_hosts
  gather_facts: false

  vars:
    zabbix_server: "10.197.0.130"
    zabbix_hostname: "{{ inventory_hostname }}"
    # URL do Zabbix Agent 2
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"

  tasks:

    - name: Criar diretório temporário
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Baixar MSI do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    - name: Remover agentes anteriores (antigo ou Agent 2 antigo)
      ansible.windows.win_shell: |
        # Para o Agent antigo
        if (Test-Path "C:\Program Files\Zabbix Agent\zabbix_agentd.exe") {
          & "C:\Program Files\Zabbix Agent\zabbix_agentd.exe" --stop 2>$null
          & "C:\Program Files\Zabbix Agent\zabbix_agentd.exe" --uninstall 2>$null
        }
        # Para o Agent 2 antigo
        if (Test-Path "C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe") {
          & "C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe" --stop 2>$null
          & "C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe" --uninstall 2>$null
        }
        sc.exe delete "Zabbix Agent" 2>$null
        sc.exe delete "Zabbix Agent 2" 2>$null
        Start-Sleep -Seconds 3
      failed_when: false

    - name: Instalar Zabbix Agent 2
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        state: present
        # Corrigido argumentos e aspas para o instalador oficial do Zabbix Agent 2
        arguments: /quiet /norestart SERVER="{{ zabbix_server }}" SERVERACTIVE="{{ zabbix_server }}" HOSTNAME="{{ zabbix_hostname }}" ADD_TO_PATH=1

    - name: Abrir porta 10050 no firewall
      community.windows.win_firewall_rule:
        name: "Zabbix Agent 2"
        localport: 10050
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Descobrir o nome real do serviço instalado
      ansible.windows.win_shell: |
        (Get-Service -Name *zabbix*).Name
      register: zabbix_service_name
      changed_when: false

    - name: Garantir serviço do Zabbix Agent rodando
      ansible.windows.win_service:
        # Usa dinamicamente o nome encontrado no passo anterior (evita quebrar se for "Zabbix Agent 2" ou "Zabbix Agent")
        name: "{{ zabbix_service_name.stdout | trim }}"
        start_mode: auto
        state: started
