---
- name: Instalar Zabbix Agent 2 no Windows
  hosts: windows_hosts
  gather_facts: false
  vars:
    zabbix_server: "10.197.0.130"
    zabbix_hostname: "{{ inventory_hostname }}"
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent2-7.4.11-windows-amd64-openssl.msi"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent2.msi"

  tasks:

    # -------------------------------------------------------------------------
    # 1. Preparação
    # -------------------------------------------------------------------------

    - name: Criar diretório temporário
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Baixar MSI do Zabbix Agent 2
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    # -------------------------------------------------------------------------
    # 2. Limpeza de instalações anteriores
    # -------------------------------------------------------------------------

    - name: Parar serviços antigos se existirem
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop:
        - "Zabbix Agent"
        - "Zabbix Agent 2"
      failed_when: false

    - name: Desinstalar via msiexec (usa o MSI já baixado como referência)
      ansible.windows.win_shell: |
        $msi = "{{ zabbix_msi_dest }}"

        # Obtém o ProductCode do MSI para desinstalação limpa
        $installer = New-Object -ComObject WindowsInstaller.Installer
        $db = $installer.OpenDatabase($msi, 0)
        $view = $db.OpenView("SELECT Value FROM Property WHERE Property = 'ProductCode'")
        $view.Execute()
        $record = $view.Fetch()
        $productCode = $record.StringData(1)

        if ($productCode) {
          Write-Output "Desinstalando ProductCode: $productCode"
          $result = Start-Process -FilePath "msiexec.exe" `
            -ArgumentList "/x $productCode /quiet /norestart" `
            -Wait -PassThru
          Write-Output "Exit code desinstalação: $($result.ExitCode)"
        } else {
          Write-Output "ProductCode não encontrado, pulando desinstalação MSI"
        }
      failed_when: false

    - name: Remover resquícios de serviços e arquivos
      ansible.windows.win_shell: |
        # Remove serviços órfãos do SCM
        sc.exe delete "Zabbix Agent"  2>$null
        sc.exe delete "Zabbix Agent 2" 2>$null

        # Aguarda o Windows liberar handles de arquivo
        Start-Sleep -Seconds 5

        # Remove diretórios de instalação anteriores
        foreach ($path in @("C:\Program Files\Zabbix Agent", "C:\Program Files\Zabbix Agent 2")) {
          if (Test-Path $path) {
            Remove-Item -Path $path -Recurse -Force -ErrorAction SilentlyContinue
            Write-Output "Removido: $path"
          }
        }
      failed_when: false

    # -------------------------------------------------------------------------
    # 3. Instalação limpa via msiexec direto
    #    (win_package tem comportamento imprevisível em modo repair)
    # -------------------------------------------------------------------------

    - name: Instalar Zabbix Agent 2 via msiexec
      ansible.windows.win_shell: |
        $result = Start-Process -FilePath "msiexec.exe" -ArgumentList @(
          '/i', '{{ zabbix_msi_dest }}',
          '/quiet',
          '/norestart',
          'SERVER={{ zabbix_server }}',
          'SERVERACTIVE={{ zabbix_server }}',
          'HOSTNAME={{ zabbix_hostname }}',
          'ENABLEPATH=1'
        ) -Wait -PassThru

        Write-Output "Exit code instalação: $($result.ExitCode)"

        if ($result.ExitCode -ne 0) {
          Write-Error "msiexec falhou com exit code $($result.ExitCode)"
          exit $result.ExitCode
        }
      register: msi_install

    # -------------------------------------------------------------------------
    # 4. Aguardar o SCM registrar o serviço (pode demorar alguns segundos)
    # -------------------------------------------------------------------------

    - name: Aguardar serviço 'Zabbix Agent 2' aparecer no SCM
      ansible.windows.win_shell: |
        $timeout = 30
        $elapsed  = 0
        while ($elapsed -lt $timeout) {
          $svc = Get-Service -Name "Zabbix Agent 2" -ErrorAction SilentlyContinue
          if ($svc) {
            Write-Output "Serviço encontrado com status: $($svc.Status)"
            exit 0
          }
          Start-Sleep -Seconds 2
          $elapsed += 2
        }
        Write-Error "Timeout de ${timeout}s: serviço 'Zabbix Agent 2' não registrado"
        exit 1
      register: svc_wait

    # -------------------------------------------------------------------------
    # 5. Configuração do serviço e firewall
    # -------------------------------------------------------------------------

    - name: Garantir serviço do Zabbix Agent 2 em execução
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
        start_mode: auto
        state: started

    - name: Abrir porta 10050 no firewall do Windows
      community.windows.win_firewall_rule:
        name: "Zabbix Agent 2"
        localport: 10050
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    # -------------------------------------------------------------------------
    # 6. Validação final
    # -------------------------------------------------------------------------

    - name: Validar status final do serviço
      ansible.windows.win_shell: |
        $svc = Get-Service -Name "Zabbix Agent 2" -ErrorAction Stop
        if ($svc.Status -ne "Running") {
          Write-Error "Serviço está com status: $($svc.Status)"
          exit 1
        }
        Write-Output "OK - Zabbix Agent 2 está rodando"
      register: final_check

    - name: Exibir resultado da validação
      ansible.builtin.debug:
        msg: "{{ final_check.stdout_lines }}"
