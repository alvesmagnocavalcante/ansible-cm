---
- name: Coletar saude dos hosts Windows
  hosts: "{{ heartbeat_target_group | default('windows_hosts') }}"
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Criar grupo de relatorio somente na memoria do controlador
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: heartbeat_report_hosts
      loop: "{{ ansible_play_hosts_all }}"
      run_once: true
      changed_when: false

    - name: Verificar conectividade WinRM sem copiar arquivos
      ansible.builtin.raw: "Write-Output '__HEARTBEAT_OK__'"
      register: heartbeat_ping
      changed_when: false
      failed_when: false

    - name: Registrar estado de conectividade
      ansible.builtin.set_fact:
        heartbeat_reachable: >-
          {{ '__HEARTBEAT_OK__' in (heartbeat_ping.stdout | default('')) }}
      delegate_to: localhost

    - name: Consultar metricas somente leitura via PowerShell e CIM
      ansible.builtin.raw: |
        $ErrorActionPreference = 'Stop'
        $ProgressPreference = 'SilentlyContinue'

        $os = Get-CimInstance Win32_OperatingSystem
        $computer = Get-CimInstance Win32_ComputerSystem
        $cpuSamples = Get-CimInstance Win32_Processor | Select-Object -ExpandProperty LoadPercentage
        $cpu = [math]::Round(($cpuSamples | Measure-Object -Average).Average, 1)
        $memoryUsed = [math]::Round((1 - ($os.FreePhysicalMemory / $os.TotalVisibleMemorySize)) * 100, 1)
        $uptime = (Get-Date) - $os.LastBootUpTime

        $disks = @(
          Get-CimInstance Win32_LogicalDisk -Filter 'DriveType=3' | ForEach-Object {
            [pscustomobject]@{
              drive = $_.DeviceID
              size_gb = [math]::Round($_.Size / 1GB, 1)
              free_gb = [math]::Round($_.FreeSpace / 1GB, 1)
              free_percent = if ($_.Size) { [math]::Round(($_.FreeSpace / $_.Size) * 100, 1) } else { 0 }
            }
          }
        )

        $stoppedAutomatic = @(Get-CimInstance Win32_Service | Where-Object {
          $_.StartMode -eq 'Auto' -and $_.State -ne 'Running'
        }).Count

        $defenderEnabled = $null
        $defenderRealtime = $null
        $defenderSignatureAge = $null
        $defenderError = $null

        try {
          $defender = Get-MpComputerStatus
          $defenderEnabled = [bool]$defender.AntivirusEnabled
          $defenderRealtime = [bool]$defender.RealTimeProtectionEnabled

          if ($defender.AntivirusSignatureLastUpdated) {
            $defenderSignatureAge = [math]::Round(((Get-Date) - $defender.AntivirusSignatureLastUpdated).TotalDays, 1)
          }
        } catch {
          $defenderError = $_.Exception.Message
        }

        [pscustomobject]@{
          hostname = $env:COMPUTERNAME
          os = $os.Caption
          os_version = $os.Version
          manufacturer = $computer.Manufacturer
          model = $computer.Model
          cpu_percent = $cpu
          memory_total_gb = [math]::Round($os.TotalVisibleMemorySize / 1MB, 1)
          memory_used_percent = $memoryUsed
          uptime_days = [math]::Round($uptime.TotalDays, 1)
          last_boot = $os.LastBootUpTime.ToString('yyyy-MM-dd HH:mm:ss')
          stopped_automatic_services = $stoppedAutomatic
          disks = $disks
          defender_enabled = $defenderEnabled
          defender_realtime_enabled = $defenderRealtime
          defender_signature_age_days = $defenderSignatureAge
          defender_error = $defenderError
          collected_at = (Get-Date).ToString('yyyy-MM-dd HH:mm:ss')
        } | ConvertTo-Json -Depth 5 -Compress
      register: heartbeat_raw
      changed_when: false
      failed_when: false
      when: heartbeat_reachable

    - name: Normalizar dados coletados
      ansible.builtin.set_fact:
        heartbeat_collection_ok: >-
          {{ heartbeat_reachable and
             (heartbeat_raw.rc | default(1) == 0) and
             (heartbeat_raw.stdout | default('') | length > 0) }}
        heartbeat_data: >-
          {{ (heartbeat_raw.stdout | from_json)
             if (heartbeat_reachable and
                 (heartbeat_raw.rc | default(1) == 0) and
                 (heartbeat_raw.stdout | default('') | length > 0))
             else {} }}
      delegate_to: localhost

- name: Gerar e enviar relatorio consolidado
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validar que existem hosts no relatorio
      ansible.builtin.assert:
        that:
          - groups['heartbeat_report_hosts'] | default([]) | length > 0
        fail_msg: >-
          Nenhum host foi registrado para o relatorio. Confira o grupo definido em
          heartbeat_target_group e o inventario selecionado no Semaphore.

    - name: Informar quantidade de hosts encontrados
      ansible.builtin.debug:
        msg: >-
          {{ groups['heartbeat_report_hosts'] | default([]) | length }} hosts serao
          incluidos no relatorio.

    - name: Inicializar classificacao dos hosts
      ansible.builtin.set_fact:
        heartbeat_hosts: "{{ groups['heartbeat_report_hosts'] | default([]) }}"
        heartbeat_online_hosts: []
        heartbeat_offline_hosts: []
        heartbeat_alert_hosts: []
        heartbeat_defender_alert_hosts: []

    - name: Classificar hosts online e offline
      ansible.builtin.set_fact:
        heartbeat_online_hosts: >-
          {{ heartbeat_online_hosts +
             ([item] if hostvars[item].heartbeat_collection_ok | default(false) else []) }}
        heartbeat_offline_hosts: >-
          {{ heartbeat_offline_hosts +
             ([] if hostvars[item].heartbeat_collection_ok | default(false) else [item]) }}
      loop: "{{ heartbeat_hosts }}"
      loop_control:
        label: "{{ item }}"

    - name: Identificar hosts com alertas de recursos
      ansible.builtin.set_fact:
        heartbeat_alert_hosts: "{{ heartbeat_alert_hosts + [item] }}"
      loop: "{{ heartbeat_online_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        current_data: "{{ hostvars[item].heartbeat_data | default({}) }}"
      when: >-
        ((current_data.cpu_percent | default(0, true) | float) >= (cpu_warning_percent | float)) or
        ((current_data.memory_used_percent | default(0, true) | float) >= (memory_warning_percent | float)) or
        ((current_data.stopped_automatic_services | default(0, true) | int) > 0) or
        ((current_data.disks | default([], true) |
          selectattr('free_percent', 'le', disk_warning_percent) | list | length) > 0)

    - name: Identificar hosts com Windows Defender desativado
      ansible.builtin.set_fact:
        heartbeat_defender_alert_hosts: "{{ heartbeat_defender_alert_hosts + [item] }}"
      loop: "{{ heartbeat_online_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        current_data: "{{ hostvars[item].heartbeat_data | default({}) }}"
      when: >-
        ((current_data.defender_enabled | default(true, true)) == false) or
        ((current_data.defender_realtime_enabled | default(true, true)) == false) or
        ((current_data.defender_error | default('', true) | string | length) > 0)

    - name: Exibir resumo antes do envio
      ansible.builtin.debug:
        msg: >-
          Total={{ heartbeat_hosts | length }},
          online={{ heartbeat_online_hosts | length }},
          offline={{ heartbeat_offline_hosts | length }},
          alertas_recursos={{ heartbeat_alert_hosts | length }},
          alertas_defender={{ heartbeat_defender_alert_hosts | length }}.

    - name: Gerar relatorio HTML somente em memoria
      ansible.builtin.set_fact:
        heartbeat_report_html: >-
          {{ lookup('ansible.builtin.template',
                    playbook_dir + '/../templates/windows_heartbeat.html.j2') }}

    - name: Validar configuracao de e-mail
      ansible.builtin.assert:
        that:
          - smtp_host | length > 0
          - email_from | length > 0
          - email_to | length > 0
        fail_msg: Configure HEARTBEAT_SMTP_HOST, HEARTBEAT_EMAIL_FROM e HEARTBEAT_EMAIL_TO.
      when: send_email | bool

    - name: Enviar heartbeat por e-mail
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user if smtp_user | length > 0 else omit }}"
        password: "{{ smtp_password if smtp_password | length > 0 else omit }}"
        secure: "{{ smtp_secure }}"
        from: "{{ email_from }}"
        to: "{{ email_to.split(',') | map('trim') | list }}"
        subject: >-
          {{ email_subject }} -
          {{ ansible_facts['date_time']['date'] }}
        subtype: html
        body: "{{ heartbeat_report_html }}"
      no_log: true
      when: send_email | bool

    - name: Informar conclusao do relatorio
      ansible.builtin.debug:
        msg: >-
          Relatorio processado em memoria{{ ' e enviado por e-mail' if send_email | bool
          else ' (envio de e-mail desabilitado)' }}. Nenhum arquivo foi salvo.
