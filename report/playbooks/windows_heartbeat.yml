---
- name: Coletar saude dos hosts Windows
  hosts: "{{ heartbeat_target_group | default('windows_hosts') }}"
  gather_facts: false
  ignore_unreachable: true

  vars:
    heartbeat_shared_folder_path: 'C:\Micros\Simphony\WebServer\fiscal\nfce\request'

  tasks:
    - name: Criar grupo de relatorio somente na memoria do controlador
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: heartbeat_report_hosts
      loop: "{{ ansible_play_hosts_all }}"
      run_once: true
      changed_when: false

    # O modulo raw executa diretamente pela conexao WinRM e nao transfere uma
    # biblioteca de modulo Ansible ao host remoto.
    - name: Verificar conectividade WinRM sem copiar arquivos
      ansible.builtin.raw: "Write-Output '__HEARTBEAT_OK__'"
      register: heartbeat_ping
      changed_when: false
      failed_when: false

    - name: Registrar estado de conectividade
      ansible.builtin.set_fact:
        heartbeat_reachable: >-
          {{ '__HEARTBEAT_OK__' in (heartbeat_ping.stdout | default('')) }}
      delegate_to: localhost

    - name: Resolver endereco configurado do host offline
      ansible.builtin.command:
        argv:
          - getent
          - hosts
          - "{{ ansible_host | default(inventory_hostname) }}"
      register: heartbeat_offline_dns_target
      changed_when: false
      failed_when: false
      delegate_to: localhost
      when: not heartbeat_reachable

    - name: Resolver nome do inventario do host offline
      ansible.builtin.command:
        argv:
          - getent
          - hosts
          - "{{ inventory_hostname }}"
      register: heartbeat_offline_dns_name
      changed_when: false
      failed_when: false
      delegate_to: localhost
      when: not heartbeat_reachable

    - name: Testar ping ICMP do host offline pelo controlador
      ansible.builtin.command:
        argv:
          - ping
          - -c
          - "1"
          - -W
          - "2"
          - "{{ ansible_host | default(inventory_hostname) }}"
      register: heartbeat_offline_ping
      changed_when: false
      failed_when: false
      delegate_to: localhost
      when: not heartbeat_reachable

    - name: Testar porta WinRM do host offline pelo controlador
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ ansible_port | default(5986) }}"
        state: started
        timeout: 3
      register: heartbeat_offline_winrm_port
      changed_when: false
      failed_when: false
      delegate_to: localhost
      when: not heartbeat_reachable

    - name: Registrar diagnostico de host offline
      ansible.builtin.set_fact:
        heartbeat_offline_diagnostic:
          target: "{{ ansible_host | default(inventory_hostname) }}"
          inventory_name: "{{ inventory_hostname }}"
          dns_target_resolves: "{{ heartbeat_offline_dns_target.rc == 0 }}"
          dns_target_ips: "{{ heartbeat_offline_dns_target.stdout | default('') | regex_findall('\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b') }}"
          dns_inventory_resolves: "{{ heartbeat_offline_dns_name.rc == 0 }}"
          dns_inventory_ips: "{{ heartbeat_offline_dns_name.stdout | default('') | regex_findall('\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b') }}"
          ping_ok: "{{ heartbeat_offline_ping.rc == 0 }}"
          winrm_port: "{{ ansible_port | default(5986) }}"
          winrm_port_open: "{{ heartbeat_offline_winrm_port.state | default('') == 'started' }}"
          reason: >-
            {% set target = ansible_host | default(inventory_hostname) %}
            {% set target_ips = heartbeat_offline_dns_target.stdout | default('') | regex_findall('\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b') %}
            {% set name_ips = heartbeat_offline_dns_name.stdout | default('') | regex_findall('\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b') %}
            {% set target_is_ip = target is match('^(?:\\d{1,3}\\.){3}\\d{1,3}$') %}
            {% set ping_ok = heartbeat_offline_ping.rc == 0 %}
            {% set winrm_open = heartbeat_offline_winrm_port.state | default('') == 'started' %}
            {% if heartbeat_offline_dns_target.rc != 0 %}
            DNS nao resolve o endereco configurado.
            {% elif target_is_ip and name_ips | length > 0 and target not in name_ips %}
            Possivel IP alterado: o nome resolve para {{ name_ips | join(', ') }}, mas o inventario usa {{ target }}.
            {% elif winrm_open %}
            Porta WinRM aberta, mas a validacao WinRM falhou. Verifique credenciais, TLS ou autorizacao.
            {% elif ping_ok %}
            Host responde ping, mas a porta WinRM {{ ansible_port | default(5986) }} nao respondeu. Verifique servico WinRM ou firewall.
            {% elif target_ips | length > 0 %}
            Sem ping e sem WinRM. Possivel maquina desligada, bloqueio de rede/firewall ou IP alterado.
            {% else %}
            Sem DNS, ping e WinRM. Verifique nome/IP no inventario.
            {% endif %}
      delegate_to: localhost
      when: not heartbeat_reachable

    - name: Consultar metricas somente leitura via PowerShell e CIM
      ansible.builtin.raw: |
        $ErrorActionPreference = 'Stop'
        $ProgressPreference = 'SilentlyContinue'

        $os = Get-CimInstance Win32_OperatingSystem
        $computer = Get-CimInstance Win32_ComputerSystem
        $cpuSamples = Get-CimInstance Win32_Processor | Select-Object -ExpandProperty LoadPercentage
        $cpu = [math]::Round(($cpuSamples | Measure-Object -Average).Average, 1)
        $memoryUsed = [math]::Round((1 - ($os.FreePhysicalMemory / $os.TotalVisibleMemorySize)) * 100, 1)
        $uptime = (Get-Date) - $os.LastBootUpTime

        $disks = @(
          Get-CimInstance Win32_LogicalDisk -Filter 'DriveType=3' | ForEach-Object {
            [pscustomobject]@{
              drive = $_.DeviceID
              size_gb = [math]::Round($_.Size / 1GB, 1)
              free_gb = [math]::Round($_.FreeSpace / 1GB, 1)
              free_percent = if ($_.Size) { [math]::Round(($_.FreeSpace / $_.Size) * 100, 1) } else { 0 }
            }
          }
        )

        $stoppedAutomatic = @(Get-CimInstance Win32_Service | Where-Object {
          $_.StartMode -eq 'Auto' -and $_.State -ne 'Running'
        }).Count

        $dhcpAdapters = @()
        $dhcpEnabled = $null
        $dhcpStatus = "Indisponivel"
        $dhcpError = $null

        try {
          $dhcpAdapters = @(
            Get-CimInstance Win32_NetworkAdapterConfiguration -Filter 'IPEnabled=True' -ErrorAction Stop | ForEach-Object {
              [pscustomobject]@{
                description = $_.Description
                dhcp_enabled = [bool]$_.DHCPEnabled
                dhcp_server = $_.DHCPServer
                ip_addresses = @($_.IPAddress)
              }
            }
          )

          if ($dhcpAdapters.Count -gt 0) {
            $dhcpEnabledAdapters = @($dhcpAdapters | Where-Object { $_.dhcp_enabled })
            $dhcpDisabledAdapters = @($dhcpAdapters | Where-Object { -not $_.dhcp_enabled })

            if ($dhcpEnabledAdapters.Count -eq $dhcpAdapters.Count) {
              $dhcpEnabled = $true
              $dhcpStatus = "Ativo"
            } elseif ($dhcpDisabledAdapters.Count -eq $dhcpAdapters.Count) {
              $dhcpEnabled = $false
              $dhcpStatus = "Desativado"
            } else {
              $dhcpEnabled = $null
              $dhcpStatus = "Misto"
            }
          } else {
            $dhcpStatus = "Sem adaptador IP ativo"
          }
        } catch {
          $dhcpError = $_.Exception.Message
          $dhcpStatus = "Erro ao consultar"
        }

        [pscustomobject]@{
          hostname = $env:COMPUTERNAME
          os = $os.Caption
          os_version = $os.Version
          manufacturer = $computer.Manufacturer
          model = $computer.Model
          cpu_percent = $cpu
          memory_total_gb = [math]::Round($os.TotalVisibleMemorySize / 1MB, 1)
          memory_used_percent = $memoryUsed
          uptime_days = [math]::Round($uptime.TotalDays, 1)
          last_boot = $os.LastBootUpTime.ToString('yyyy-MM-dd HH:mm:ss')
          stopped_automatic_services = $stoppedAutomatic
          dhcp_enabled = $dhcpEnabled
          dhcp_status = $dhcpStatus
          dhcp_adapters = $dhcpAdapters
          dhcp_error = $dhcpError
          disks = $disks
          collected_at = (Get-Date).ToString('yyyy-MM-dd HH:mm:ss')
        } | ConvertTo-Json -Depth 5 -Compress
      register: heartbeat_raw
      changed_when: false
      failed_when: false
      when: heartbeat_reachable

    - name: Normalizar dados coletados
      ansible.builtin.set_fact:
        heartbeat_collection_ok: >-
          {{ heartbeat_reachable and
             (heartbeat_raw.rc | default(1) == 0) and
             (heartbeat_raw.stdout | default('') | length > 0) }}
        heartbeat_data: >-
          {{ (heartbeat_raw.stdout | from_json)
             if (heartbeat_reachable and
                 (heartbeat_raw.rc | default(1) == 0) and
                 (heartbeat_raw.stdout | default('') | length > 0))
             else {} }}
      delegate_to: localhost

    - name: Consultar compartilhamento da pasta fiscal
      ansible.builtin.raw: |
        $ProgressPreference = 'SilentlyContinue'
        $folderPath = 'C:\Micros\Simphony\WebServer\fiscal\nfce\request'
        $exists = $false
        $accessible = $false
        $direct = $false
        $shareName = $null
        $sharePath = $null
        $uncPath = $null
        $status = 'Indisponivel'
        $errorMessage = $null

        try {
          $target = [IO.Path]::GetFullPath($folderPath).TrimEnd('\')
          $exists = Test-Path -LiteralPath $target -PathType Container
          $matches = @(
            Get-SmbShare -ErrorAction Stop | Where-Object { $_.Path -and -not $_.Special } | ForEach-Object {
              $base = [IO.Path]::GetFullPath($_.Path).TrimEnd('\')
              $isDirect = $target -ieq $base
              $isChild = $target.StartsWith(($base + '\'), [StringComparison]::OrdinalIgnoreCase)
              if ($isDirect -or $isChild) {
                [pscustomobject]@{ name = $_.Name; path = $_.Path; base = $base; direct = $isDirect }
              }
            }
          )

          $share = $matches | Sort-Object -Property @{Expression={$_.direct}; Descending=$true}, @{Expression={$_.base.Length}; Descending=$true} | Select-Object -First 1

          if (-not $exists) {
            $status = 'Pasta inexistente'
          } elseif ($null -eq $share) {
            $status = 'Nao compartilhada'
          } else {
            $accessible = $true
            $direct = [bool]$share.direct
            $shareName = $share.name
            $sharePath = $share.path
            $relative = $target.Substring($share.base.Length).TrimStart('\')
            $uncPath = "\\$env:COMPUTERNAME\$shareName"
            if ($relative) { $uncPath += "\$relative" }
            if ($direct) { $status = 'Compartilhada diretamente' }
            else { $status = 'Compartilhada via pasta superior' }
          }
        } catch {
          $status = 'Erro ao consultar'
          $errorMessage = $_.Exception.Message
        }

        [pscustomobject]@{
          shared_folder_path = $folderPath
          shared_folder_exists = $exists
          shared_folder_accessible = $accessible
          shared_folder_direct = $direct
          shared_folder_share_name = $shareName
          shared_folder_share_path = $sharePath
          shared_folder_unc_path = $uncPath
          shared_folder_status = $status
          shared_folder_error = $errorMessage
        } | ConvertTo-Json -Compress
      register: heartbeat_shared_folder_raw
      changed_when: false
      failed_when: false
      when: heartbeat_collection_ok

    - name: Normalizar verificacao da pasta fiscal
      ansible.builtin.set_fact:
        heartbeat_shared_folder_data: >-
          {{ (heartbeat_shared_folder_raw.stdout | trim | from_json)
             if ((heartbeat_shared_folder_raw.rc | default(1) == 0) and
                 (heartbeat_shared_folder_raw.stdout | default('') | trim | length > 0))
             else {
               'shared_folder_path': heartbeat_shared_folder_path,
               'shared_folder_exists': false,
               'shared_folder_accessible': false,
               'shared_folder_direct': false,
               'shared_folder_share_name': none,
               'shared_folder_share_path': none,
               'shared_folder_unc_path': none,
               'shared_folder_status': 'Erro ao consultar',
               'shared_folder_error': 'Falha na tarefa PowerShell'
             } }}
      delegate_to: localhost
      when: heartbeat_collection_ok

    - name: Adicionar verificacao da pasta aos dados coletados
      ansible.builtin.set_fact:
        heartbeat_data: >-
          {{ heartbeat_data | combine(heartbeat_shared_folder_data, recursive=true) }}
      delegate_to: localhost
      when: heartbeat_collection_ok

    - name: Consultar Defender e Firewall sem afetar status online
      ansible.builtin.raw: |
        $ProgressPreference = 'SilentlyContinue'

        $defenderEnabled = $null
        $defenderRealtime = $null
        $defenderSignatureAge = $null
        $defenderError = $null
        $defenderStatus = "Indisponivel"

        try {
          $defender = Get-MpComputerStatus -ErrorAction Stop
          $defenderEnabled = [bool]$defender.AntivirusEnabled
          $defenderRealtime = [bool]$defender.RealTimeProtectionEnabled

          if ($defender.AntivirusSignatureLastUpdated) {
            $defenderSignatureAge = [math]::Round(((Get-Date) - $defender.AntivirusSignatureLastUpdated).TotalDays, 1)
          }

          if ($defenderEnabled -and $defenderRealtime) {
            $defenderStatus = "Ativo"
          } elseif ($defenderEnabled -and -not $defenderRealtime) {
            $defenderStatus = "Antivirus ativo, tempo real desativado"
          } else {
            $defenderStatus = "Desativado"
          }
        } catch {
          $defenderError = $_.Exception.Message
          $defenderStatus = "Erro ao consultar"
        }

        $firewallProfiles = @()
        $firewallAllEnabled = $null
        $firewallStatus = "Indisponivel"
        $firewallError = $null

        try {
          $firewallProfiles = @(
            Get-NetFirewallProfile -ErrorAction Stop | ForEach-Object {
              [pscustomobject]@{
                name = $_.Name.ToString()
                enabled = [bool]$_.Enabled
                default_inbound_action = $_.DefaultInboundAction.ToString()
                default_outbound_action = $_.DefaultOutboundAction.ToString()
              }
            }
          )

          if ($firewallProfiles.Count -gt 0) {
            $disabledProfiles = @($firewallProfiles | Where-Object { -not $_.enabled })
            $firewallAllEnabled = ($disabledProfiles.Count -eq 0)

            if ($firewallAllEnabled) {
              $firewallStatus = "Ativo"
            } else {
              $firewallStatus = "Desativado em: " + (($disabledProfiles | Select-Object -ExpandProperty name) -join ", ")
            }
          }
        } catch {
          $firewallError = $_.Exception.Message
          $firewallStatus = "Erro ao consultar"
        }

        [pscustomobject]@{
          defender_enabled = $defenderEnabled
          defender_realtime_enabled = $defenderRealtime
          defender_status = $defenderStatus
          defender_signature_age_days = $defenderSignatureAge
          defender_error = $defenderError
          firewall_all_enabled = $firewallAllEnabled
          firewall_status = $firewallStatus
          firewall_profiles = $firewallProfiles
          firewall_error = $firewallError
        } | ConvertTo-Json -Depth 5 -Compress
      register: heartbeat_security_raw
      changed_when: false
      failed_when: false
      when: heartbeat_collection_ok

    - name: Adicionar Defender e Firewall aos dados coletados
      ansible.builtin.set_fact:
        heartbeat_security_data: >-
          {{ (heartbeat_security_raw.stdout | from_json)
             if ((heartbeat_security_raw.rc | default(1) == 0) and
                 (heartbeat_security_raw.stdout | default('') | length > 0))
             else {
               'defender_enabled': none,
               'defender_realtime_enabled': none,
               'defender_status': 'Indisponivel',
               'defender_signature_age_days': none,
               'defender_error': 'Falha ao consultar',
               'firewall_all_enabled': none,
               'firewall_status': 'Indisponivel',
               'firewall_profiles': [],
               'firewall_error': 'Falha ao consultar'
             } }}
      delegate_to: localhost
      when: heartbeat_collection_ok

    - name: Mesclar Defender e Firewall no relatorio do host
      ansible.builtin.set_fact:
        heartbeat_data: >-
          {{ heartbeat_data | combine(heartbeat_security_data, recursive=true) }}
      delegate_to: localhost
      when: heartbeat_collection_ok

- name: Gerar e enviar relatorio consolidado
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validar que existem hosts no relatorio
      ansible.builtin.assert:
        that:
          - groups['heartbeat_report_hosts'] | default([]) | length > 0
        fail_msg: >-
          Nenhum host foi registrado para o relatorio. Confira o grupo definido em
          heartbeat_target_group e o inventario selecionado no Semaphore.

    - name: Informar quantidade de hosts encontrados
      ansible.builtin.debug:
        msg: >-
          {{ groups['heartbeat_report_hosts'] | default([]) | length }} hosts serao
          incluidos no relatorio.

    - name: Inicializar classificacao dos hosts
      ansible.builtin.set_fact:
        heartbeat_hosts: "{{ groups['heartbeat_report_hosts'] | default([]) }}"
        heartbeat_online_hosts: []
        heartbeat_offline_hosts: []
        heartbeat_alert_hosts: []
        heartbeat_defender_alert_hosts: []
        heartbeat_shared_folder_hosts: []

    - name: Classificar hosts online e offline
      ansible.builtin.set_fact:
        heartbeat_online_hosts: >-
          {{ heartbeat_online_hosts +
             ([item] if hostvars[item].heartbeat_collection_ok | default(false) else []) }}
        heartbeat_offline_hosts: >-
          {{ heartbeat_offline_hosts +
             ([] if hostvars[item].heartbeat_collection_ok | default(false) else [item]) }}
      loop: "{{ heartbeat_hosts }}"
      loop_control:
        label: "{{ item }}"

    - name: Identificar hosts com alertas
      ansible.builtin.set_fact:
        heartbeat_alert_hosts: "{{ heartbeat_alert_hosts + [item] }}"
      loop: "{{ heartbeat_online_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        current_data: "{{ hostvars[item].heartbeat_data | default({}) }}"
      when: >-
        ((current_data.cpu_percent | default(0, true) | float) >= (cpu_warning_percent | float)) or
        ((current_data.memory_used_percent | default(0, true) | float) >= (memory_warning_percent | float)) or
        ((current_data.stopped_automatic_services | default(0, true) | int) > 0) or
        ((current_data.disks | default([], true) |
         selectattr('free_percent', 'le', disk_warning_percent) | list | length) > 0)

    - name: Identificar hosts com Defender ou Firewall desativado
      ansible.builtin.set_fact:
        heartbeat_defender_alert_hosts: "{{ heartbeat_defender_alert_hosts + [item] }}"
      loop: "{{ heartbeat_online_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        current_data: "{{ hostvars[item].heartbeat_data | default({}) }}"
      when: >-
        ((current_data.defender_enabled | default(true, true)) == false) or
        ((current_data.defender_realtime_enabled | default(true, true)) == false) or
        ((current_data.firewall_all_enabled | default(true, true)) == false) or
        ((current_data.defender_error | default('', true) | string | length) > 0) or
        ((current_data.firewall_error | default('', true) | string | length) > 0)

    - name: Identificar hosts com a pasta fiscal compartilhada
      ansible.builtin.set_fact:
        heartbeat_shared_folder_hosts: "{{ heartbeat_shared_folder_hosts + [item] }}"
      loop: "{{ heartbeat_online_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        current_data: "{{ hostvars[item].heartbeat_data | default({}) }}"
      when: current_data.shared_folder_accessible | default(false) | bool

    - name: Exibir status de Defender e Firewall
      ansible.builtin.debug:
        msg: >-
          {{ item }}:
          Defender={{ current_data.defender_status | default('Indisponivel', true) }};
          Firewall={{ current_data.firewall_status | default('Indisponivel', true) }};
          DHCP={{ current_data.dhcp_status | default('Indisponivel', true) }}
      loop: "{{ heartbeat_online_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        current_data: "{{ hostvars[item].heartbeat_data | default({}) }}"

    - name: Exibir diagnostico dos hosts offline
      ansible.builtin.debug:
        msg: >-
          {{ item }}:
          {{ offline_diag.reason | default('Diagnostico indisponivel', true) }}
          Target={{ offline_diag.target | default(hostvars[item].ansible_host | default(item), true) }};
          DNS={{ 'OK' if offline_diag.dns_target_resolves | default(false) | bool else 'Falhou' }};
          Ping={{ 'OK' if offline_diag.ping_ok | default(false) | bool else 'Falhou' }};
          WinRM={{ 'OK' if offline_diag.winrm_port_open | default(false) | bool else 'Falhou' }}
      loop: "{{ heartbeat_offline_hosts }}"
      loop_control:
        label: "{{ item }}"
      vars:
        offline_diag: "{{ hostvars[item].heartbeat_offline_diagnostic | default({}) }}"

    - name: Exibir resumo antes do envio
      ansible.builtin.debug:
        msg: >-
          Total={{ heartbeat_hosts | length }},
          online={{ heartbeat_online_hosts | length }},
          offline={{ heartbeat_offline_hosts | length }},
          alertas={{ heartbeat_alert_hosts | length }},
          alertas_defender_firewall={{ heartbeat_defender_alert_hosts | length }},
          pasta_compartilhada={{ heartbeat_shared_folder_hosts | length }}/{{ heartbeat_online_hosts | length }}.

    - name: Definir nome do hotel no relatorio
      ansible.builtin.set_fact:
        heartbeat_report_hotel_name: >-
          {{ heartbeat_report_hotel |
             default(hotel_name |
             default(heartbeat_report_name |
             default(lookup('ansible.builtin.env', 'HEARTBEAT_REPORT_HOTEL') |
             default(lookup('ansible.builtin.env', 'heartbeat_report_hotel') |
             default(lookup('ansible.builtin.env', 'HOTEL_NAME') |
             default(lookup('ansible.builtin.env', 'hotel_name') |
             default(heartbeat_target_group | default('', true), true), true), true), true), true), true), true) |
             string | trim }}

    - name: Definir titulo do relatorio
      ansible.builtin.set_fact:
        heartbeat_report_title: >-
          {{ 'Status dos Servidores e VMs Windows - ' ~ heartbeat_report_hotel_name
             if (heartbeat_report_hotel_name | string | length) > 0
             else 'Status dos Servidores e VMs Windows' }}

    - name: Localizar template do relatorio HTML
      ansible.builtin.set_fact:
        heartbeat_template_path: >-
          {{ lookup('ansible.builtin.first_found',
                    {
                      'files': [
                        playbook_dir + '/../templates/windows_heartbeat.html.j2',
                        playbook_dir + '/windows_heartbeat.html.j2'
                      ],
                      'skip': true
                    }) }}

    - name: Validar template do relatorio HTML
      ansible.builtin.assert:
        that:
          - heartbeat_template_path | length > 0
        fail_msg: >-
          Template windows_heartbeat.html.j2 nao encontrado. No Semaphore, coloque o arquivo
          em report/templates/windows_heartbeat.html.j2 ou ao lado do playbook.

    - name: Gerar relatorio HTML somente em memoria
      ansible.builtin.set_fact:
        heartbeat_report_html: >-
          {{ lookup('ansible.builtin.template', heartbeat_template_path) }}

    - name: Validar configuracao de e-mail
      ansible.builtin.assert:
        that:
          - smtp_host | length > 0
          - email_from | length > 0
          - email_to | length > 0
        fail_msg: Configure HEARTBEAT_SMTP_HOST, HEARTBEAT_EMAIL_FROM e HEARTBEAT_EMAIL_TO.
      when: send_email | bool

    - name: Validar resolucao DNS do servidor SMTP
      ansible.builtin.command:
        argv:
          - getent
          - hosts
          - "{{ smtp_host }}"
      register: heartbeat_smtp_dns
      changed_when: false
      failed_when: false
      when: send_email | bool

    - name: Confirmar que o servidor SMTP resolve no controlador
      ansible.builtin.assert:
        that:
          - heartbeat_smtp_dns.rc == 0
        fail_msg: >-
          Nao foi possivel resolver o SMTP '{{ smtp_host }}' no controlador do Semaphore.
          Verifique DNS/rede do servidor onde o Semaphore executa ou informe um IP em HEARTBEAT_SMTP_HOST.
      when: send_email | bool

    - name: Enviar heartbeat por e-mail
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        username: "{{ smtp_user if smtp_user | length > 0 else omit }}"
        password: "{{ smtp_password if smtp_password | length > 0 else omit }}"
        secure: "{{ smtp_secure }}"
        from: "{{ email_from }}"
        to: "{{ email_to.split(',') | map('trim') | list }}"
        subject: >-
          {{ '[' ~ heartbeat_report_hotel_name ~ '] ' if heartbeat_report_hotel_name | length > 0 else '' }}{{ email_subject }} -
          {{ ansible_facts['date_time']['date'] }}
        subtype: html
        body: "{{ heartbeat_report_html }}"
      no_log: true
      when: send_email | bool

    - name: Informar conclusao do relatorio
      ansible.builtin.debug:
        msg: >-
          Relatorio processado em memoria{{ ' e enviado por e-mail' if send_email | bool
          else ' (envio de e-mail desabilitado)' }}. Nenhum arquivo foi salvo.
