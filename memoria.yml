---
- name: Diagnosticar consumo de memória RAM no Windows
  hosts: all
  gather_facts: no

  vars:
    limiar_individual: 20   # % da RAM total que já é considerado processo "pesado"
    top_n: 10

  tasks:
    - name: Coletar uso de memória por processo via PowerShell
      ansible.windows.win_shell: |
        $TotalRam = (Get-CimInstance Win32_OperatingSystem).TotalVisibleMemorySize * 1KB

        $Procs = Get-Process | ForEach-Object {
            $memPercent = ($_.WorkingSet64 / $TotalRam) * 100
            [PSCustomObject]@{
                PID     = $_.Id
                Nome    = $_.ProcessName
                Percent = [math]::Round($memPercent, 2)
            }
        } | Sort-Object Percent -Descending

        Write-Output "== TOP {{ top_n }} PROCESSOS POR RAM =="
        $Procs | Select-Object -First {{ top_n }} | ForEach-Object {
            "PID: $($_.PID) | Nome: $($_.Nome) | RAM: $($_.Percent)%"
        }

        $Altos = $Procs | Where-Object { $_.Percent -ge {{ limiar_individual }} }
        if ($Altos) {
            Write-Output "== ALERTA: processo(s) acima de {{ limiar_individual }}% =="
            $Altos | ForEach-Object { "PID: $($_.PID) | Nome: $($_.Nome) | RAM: $($_.Percent)%" }
        }
      register: mem_check
      changed_when: false

    - name: Exibir resultado
      debug:
        msg: "{{ mem_check.stdout_lines }}"