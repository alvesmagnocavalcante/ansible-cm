---
- name: Verificar consumo agregado de memória RAM no Windows
  hosts: windows
  gather_facts: no

  vars:
    limiar_alerta: 90   # % de RAM total usada para considerar crítico

  tasks:
    - name: Coletar uso de memória do sistema via PowerShell
      ansible.windows.win_shell: |
        $OS = Get-CimInstance Win32_OperatingSystem
        $TotalRamKB  = $OS.TotalVisibleMemorySize
        $FreeRamKB   = $OS.FreePhysicalMemory
        $UsedRamKB   = $TotalRamKB - $FreeRamKB
        $PercentUsed = [math]::Round(($UsedRamKB / $TotalRamKB) * 100, 2)

        Write-Output "RAM Total: $([math]::Round($TotalRamKB/1MB,2)) GB"
        Write-Output "RAM Usada: $([math]::Round($UsedRamKB/1MB,2)) GB"
        Write-Output "PERCENTUAL:$PercentUsed"

        Write-Output "----------------------------------------"
        Write-Output "Top 5 processos por consumo de RAM:"
        Get-Process | Sort-Object WorkingSet64 -Descending | Select-Object -First 5 | ForEach-Object {
            $procPercent = [math]::Round(($_.WorkingSet64 / ($TotalRamKB * 1KB)) * 100, 2)
            "PID: $($_.Id) | Nome: $($_.ProcessName) | RAM: $procPercent%"
        }
      register: mem_check
      changed_when: false

    - name: Extrair percentual usado
      set_fact:
        ram_percent: "{{ mem_check.stdout_lines | select('match', '^PERCENTUAL:.*') | first | regex_replace('PERCENTUAL:', '') | float }}"

    - name: Exibir alerta se acima do limiar
      debug:
        msg:
          - "ALERTA: RAM em {{ ram_percent }}% (limiar: {{ limiar_alerta }}%)"
          - "{{ mem_check.stdout_lines }}"
      when: ram_percent >= limiar_alerta

    - name: Confirmar status normal
      debug:
        msg: "RAM em {{ ram_percent }}%, dentro do limiar de {{ limiar_alerta }}%."
      when: ram_percent < limiar_alerta