---
- name: Instalar Zabbix Agent no Windows
  hosts: windows_hosts
  gather_facts: false

  vars:
    zabbix_server: "10.197.0.130"
    zabbix_hostname: "{{ inventory_hostname }}"
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.11/zabbix_agent-7.4.11-windows-amd64-openssl.msi"
    zabbix_msi_dest: "C:\\Temp\\zabbix_agent.msi"

  tasks:

    - name: Criar diretório temporário
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Baixar MSI
      ansible.windows.win_get_url:
        url: "{{ zabbix_msi_url }}"
        dest: "{{ zabbix_msi_dest }}"
        force: false

    - name: Remover agente anterior
      ansible.windows.win_shell: |
        $exe = "C:\Program Files\Zabbix Agent\zabbix_agentd.exe"
        if (Test-Path $exe) {
          & $exe --stop      2>$null
          & $exe --uninstall 2>$null
          Start-Sleep -Seconds 3
        }
        sc.exe delete "Zabbix Agent" 2>$null
        Start-Sleep -Seconds 2
      failed_when: false

    - name: Instalar agente
      ansible.windows.win_package:
        path: "{{ zabbix_msi_dest }}"
        state: present
        arguments: /quiet /norestart SERVER={{ zabbix_server }} SERVERACTIVE={{ zabbix_server }} HOSTNAME={{ zabbix_hostname }} ENABLEPATH=1

    - name: Abrir porta 10050 no firewall
      community.windows.win_firewall_rule:
        name: "Zabbix Agent"
        localport: 10050
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Garantir serviço rodando
      ansible.windows.win_service:
        name: "Zabbix Agent"
        start_mode: auto
        state: started
