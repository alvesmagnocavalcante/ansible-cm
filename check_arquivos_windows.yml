---
- name: Verificar arquivos em uma pasta no Windows
  hosts: windows_hosts
  gather_facts: false
  serial: 1

  vars:
    pasta_origem: 'C:\Micros\Simphony\WebServer\fiscal\nfce\request'
    limite_nomes: 50

  tasks:
    - name: Checar arquivos na pasta sem varredura pesada
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'SilentlyContinue'
        $pasta = '{{ pasta_origem }}'
        $limite = {{ limite_nomes }}

        if (-not (Test-Path -LiteralPath $pasta -PathType Container)) {
          [pscustomobject]@{
            existe = $false
            ha_arquivos = $false
            quantidade_listada = 0
            tem_mais = $false
            arquivos = @()
            mensagem = "A pasta nao existe."
          } | ConvertTo-Json -Compress
          exit 0
        }

        $arquivos = New-Object System.Collections.Generic.List[string]
        $temMais = $false
        $enumerador = $null

        try {
          $enumerador = [System.IO.Directory]::EnumerateFiles($pasta).GetEnumerator()
          while ($enumerador.MoveNext()) {
            if ($arquivos.Count -lt $limite) {
              $arquivos.Add([System.IO.Path]::GetFileName($enumerador.Current))
            } else {
              $temMais = $true
              break
            }
          }
        } finally {
          if ($null -ne $enumerador) {
            $enumerador.Dispose()
          }
        }

        [pscustomobject]@{
          existe = $true
          ha_arquivos = ($arquivos.Count -gt 0)
          quantidade_listada = $arquivos.Count
          tem_mais = $temMais
          arquivos = @($arquivos)
          mensagem = if ($arquivos.Count -gt 0) { "Arquivos encontrados." } else { "Nenhum arquivo encontrado." }
        } | ConvertTo-Json -Compress
      register: check_arquivos
      changed_when: false
      failed_when: false

    - name: Converter resultado do check
      ansible.builtin.set_fact:
        resultado_arquivos: "{{ check_arquivos.stdout | default('{}') | from_json }}"
      when: check_arquivos.stdout is defined and check_arquivos.stdout | length > 0

    - name: Mostrar resultado
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          pasta: "{{ pasta_origem }}"
          existe: "{{ resultado_arquivos.existe | default(false) }}"
          ha_arquivos: "{{ resultado_arquivos.ha_arquivos | default(false) }}"
          quantidade_listada: "{{ resultado_arquivos.quantidade_listada | default(0) }}"
          tem_mais_arquivos: "{{ resultado_arquivos.tem_mais | default(false) }}"
          arquivos: "{{ resultado_arquivos.arquivos | default([]) }}"
          observacao: "{{ resultado_arquivos.mensagem | default('Nao foi possivel ler a pasta.') }}"
