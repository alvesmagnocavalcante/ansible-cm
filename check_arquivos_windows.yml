---
- name: Verificar arquivos em uma pasta no Windows
  hosts: windows
  gather_facts: false

  vars:
    pasta_origem: "C:\Micros\Simphony\WebServer\fiscal\nfce\request"
    buscar_subpastas: false

  tasks:
    - name: Verificar se a pasta existe
      ansible.windows.win_stat:
        path: "{{ pasta_origem }}"
      register: pasta_verificada

    - name: Parar se a pasta nao existir
      ansible.builtin.fail:
        msg: "A pasta {{ pasta_origem }} nao existe no host {{ inventory_hostname }}."
      when: not pasta_verificada.stat.exists

    - name: Parar se o caminho nao for uma pasta
      ansible.builtin.fail:
        msg: "O caminho {{ pasta_origem }} existe, mas nao e uma pasta."
      when: not pasta_verificada.stat.isdir

    - name: Procurar arquivos na pasta
      ansible.windows.win_find:
        paths: "{{ pasta_origem }}"
        file_type: file
        recurse: "{{ buscar_subpastas }}"
      register: arquivos_encontrados

    - name: Informar quando nao houver arquivos
      ansible.builtin.debug:
        msg: "Nenhum arquivo encontrado em {{ pasta_origem }} no host {{ inventory_hostname }}."
      when: arquivos_encontrados.matched | int == 0

    - name: Mostrar quantidade e nomes dos arquivos encontrados
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          pasta: "{{ pasta_origem }}"
          quantidade: "{{ arquivos_encontrados.matched }}"
          arquivos: "{{ arquivos_encontrados.files | map(attribute='filename') | list }}"
      when: arquivos_encontrados.matched | int > 0
