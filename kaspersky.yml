---
- name: Verificar instalação do Kaspersky Endpoint Security no Windows
  hosts: windows_hosts
  gather_facts: false

  tasks:
    - name: Buscar Kaspersky Endpoint Security nos registros do Windows
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"
        $paths = @(
          "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*",
          "HKLM:\SOFTWARE\Wow6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
        )

        # Âncora no início do nome evita falso-positivo com variantes
        # (ex: "Kaspersky Endpoint Security Cloud Console")
        $kes = Get-ItemProperty $paths -ErrorAction SilentlyContinue |
          Where-Object { $_.DisplayName -match "^Kaspersky Endpoint Security( for Windows)?( \(64-bit\))?$" } |
          Select-Object -First 1

        $result = [PSCustomObject]@{
          installed   = [bool]$kes
          displayName = $kes.DisplayName
          version     = $kes.DisplayVersion
        }
        $result | ConvertTo-Json -Compress
      register: kes_raw
      changed_when: false

    - name: Parsear resultado
      ansible.builtin.set_fact:
        kes_status: "{{ kes_raw.stdout | from_json }}"

    - name: Alertar se o KES foi ENCONTRADO
      ansible.builtin.debug:
        msg: "✅ INSTALADO em {{ inventory_hostname }} — {{ kes_status.displayName }} (v{{ kes_status.version }})"
      when: kes_status.installed

    - name: Alertar se o KES NÃO foi encontrado
      ansible.builtin.debug:
        msg: "❌ AUSENTE em {{ inventory_hostname }}"
      when: not kes_status.installed
